name: NLP Similarity Approximator API

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    environment:
      POSTGRES_USER: nlp_user
      POSTGRES_PASSWORD: nlp_s3cur3_pass
      POSTGRES_DB: nlp_similarity_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nlp_user -d nlp_similarity_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    restart: unless-stopped

  seq:
    image: datalust/seq:latest
    container_name: seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "P@ssw0rd"
      SEQ_API_CANONICALURI: "http://localhost:5343"
      SEQ_FIRSTRUN_ADMINAPIKEYTITLE: "app"
      SEQ_FIRSTRUN_ADMINAPIKEYTOKEN: "seq-app-dev-token"
    ports:
      - "5343:80"
      - "5344:5341"
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redisinsight:
    image: redis/redisinsight:2.46.0
    container_name: redisinsight
    environment:
      - RI_SERVER_MODE=1         # Run RedisInsight in headless server mode (fix for Windows/WSL)
    ports:
      - "8082:5540"              # Expose the web UI on localhost
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  redis_data:
